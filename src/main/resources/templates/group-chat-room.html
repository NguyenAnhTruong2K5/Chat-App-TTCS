<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhóm Trò Chuyện</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .chat-container { width: 100%; max-width: 600px; background-color: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; overflow: hidden; }

        /* --- Header --- */
        .chat-header { background-color: #ffffff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e4e6eb; box-shadow: 0 2px 5px rgba(0,0,0,0.02); z-index: 10; }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .group-icon { width: 42px; height: 42px; background-color: #e7f3ff; color: #0084ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .header-left h3 { margin: 0; font-size: 18px; color: #1c1e21; }
        .header-left p { margin: 0; font-size: 13px; color: #65676B; }

        .header-actions { display: flex; align-items: center; gap: 8px; }

        .btn-view-members, .btn-add_member { background-color: #e7f3ff; color: #0084ff; text-decoration: none; font-size: 13px; font-weight: bold; padding: 8px 12px; border-radius: 20px; transition: 0.2s; display: flex; align-items: center; border: none; cursor: pointer; }
        .btn-view-members:hover, .btn-add_member:hover { background-color: #dbeafe; }

        .btn-leave { background-color: #ffebe8; color: #fa3e3e; border: none; font-size: 13px; font-weight: bold; padding: 8px 12px; border-radius: 20px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .btn-leave:hover { background-color: #fec4c0; }

        .btn-back { background-color: #f0f2f5; color: #1c1e21; text-decoration: none; font-size: 13px; font-weight: bold; padding: 8px 12px; border-radius: 20px; transition: 0.2s; }
        .btn-back:hover { background-color: #e4e6eb; }

        /* --- Messages Area --- */
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #f0f2f5; }

        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .message-wrapper.mine { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.theirs { align-self: flex-start; align-items: flex-start; }

        .sender-name { font-size: 12px; color: #65676B; margin-bottom: 4px; margin-left: 12px; font-weight: 600; }

        .message-bubble { padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .mine .message-bubble { background-color: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .theirs .message-bubble { background-color: white; color: #1c1e21; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

         /* Input Area */
        .chat-input-area { padding: 15px; background-color: white; display: flex; gap: 10px; border-top: 1px solid #e4e6eb; }
        .chat-input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ccd0d5; border-radius: 24px; outline: none; font-size: 15px; background-color: #f0f2f5; }
        .chat-input-area input:focus { border-color: #0084ff; }
        .chat-input-area button { padding: 10px 20px; background-color: #0084ff; color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .chat-input-area button:hover { background-color: #0073e6; }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <div class="header-left">
            <div class="group-icon">👥</div>
            <div>
                <h3 th:text="${room_name}">Tên Nhóm</h3>
                <p>Nhóm trò chuyện</p>
            </div>
        </div>

        <div class="header-actions">

            <a th:href="@{/room/group/{group_id}/view_member(group_id=${room_id})}" class="btn-view-members">👥Thành viên</a>

            <details style="position: relative">
                <summary class="btn-add_member" style="list-style: none; cursor: pointer;">➕ Thêm</summary>
                <div style="position: absolute; top: 120%; right: 0; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e4e6eb; width: 250px; z-index: 50;">
                    <form th:action="@{/room/group/{group_id}/add_member(group_id=${room_id})}" method="post">
                        <label style="font-size: 12px; font-weight: bold; color: #1c1e21; display: block; margin-bottom: 5px;">Thêm qua Email:</label>
                        <input type="email" name="newMemberEmail" placeholder="Nhập email..." required style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccd0d5; border-radius: 4px; box-sizing: border-box;">
                        <button type="submit" style="width: 100%; background: #28a745; color: white; border: none; padding: 8px; border-radius: 4px; font-weight: bold; cursor: pointer;">Xác nhận Thêm</button>
                    </form>
                </div>
            </details>

            <form th:action="@{/room/group/{group_id}/leave(group_id=${room_id})}" method="post" style="margin: 0;">
                <button type="submit" class="btn-leave" onclick="return confirm('Bạn có chắc chắn muốn rời nhóm này?');">🚪 Rời nhóm</button>
            </form>

            <a th:href="@{/user/homepage/groups}" class="btn-back" title="Quay lại">Thoát</a>
        </div>
    </div>

    <div th:if="${member_count < 3}" style="padding: 20px; background-color: #fff3cd; color: #856404; text-align: center; border-top: 1px solid #ffeeba; font-size: 15px;">
        <span style="font-size: 20px; display: block; margin-bottom: 5px;"></span>
        <strong>Nhóm chưa đủ người!</strong><br>
        Nhóm cần có ít nhất 3 thành viên để bắt đầu trò chuyện.
    </div>

    <div class="chat-messages" id="messageArea">
        <th:block th:each="entry : ${pre_messages}">

            <div class="time-divider" style="text-align: center; margin: 15px 0;">
            <span style="background-color: #e4e6eb; color: #65676B; font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: bold;"
                  th:text="${entry.key.isEqual(#temporals.createToday()) ? 'Hôm nay' : (entry.key.isEqual(#temporals.createToday().minusDays(1)) ? 'Hôm qua' : #temporals.format(entry.key, 'dd/MM/yyyy'))}">
            </span>
            </div>

            <div th:each="msg : ${entry.value}"
                 class="message-wrapper"
                 th:classappend="${msg.user.userId == sender.userId} ? 'mine' : 'theirs'">

                <div th:if="${msg.user.userId != sender.userId}"
                     class="user-email"
                     style="font-size: 12px; color: #65676B; margin-bottom: 4px; margin-left: 12px; font-weight: 600;"
                     th:text="${msg.user.email}">Email người gửi
                </div>

                <div th:if="${msg.content != null and msg.content != ''}" class="message-bubble" th:text="${msg.content}">Nội dung tin nhắn</div>

                <div th:if="${msg.base64ImageCode != null}">
                    <img th:src="${msg.base64ImageCode}" style="max-width: 200px; border-radius: 12px; margin-top: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer;" />
                </div>

                <div style="font-size: 10px; color: #8d949e; margin-top: 4px; padding: 0 4px;"
                     th:text="${#temporals.format(msg.createdAt, 'HH:mm')}">
                </div>
            </div>
        </th:block>
    </div>

    <th:block th:if="${member_count >= 3}">
        <div id="imagePreviewContainer" style="display: none; padding: 10px 20px; background: #f0f2f5; border-top: 1px solid #e4e6eb; position: relative;">
            <img id="previewImage" src="" style="max-height: 80px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" />
            <button onclick="removeAttachedImage()" style="position: absolute; top: 5px; left: 15px; background: #fa3e3e; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-weight: bold; font-size: 10px; display: flex; justify-content: center; align-items: center;">X</button>
        </div>

        <div class="chat-input-area">
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImageFile(event)">
            <button type="button" onclick="document.getElementById('imageInput').click()" style="background: #e4e6eb; color: #1c1e21; padding: 10px; border-radius: 50%;">🖼️</button>
            <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." autocomplete="off" autofocus>
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </th:block>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    var roomId = /*[[${room_id}]]*/ 'default_room';
    var senderId = /*[[${sender.userId}]]*/ null;
    var senderName = /*[[${sender.username != null ? sender.username : sender.email}]]*/ 'User';

    var stompClient = null;
    var attachedBase64Image = null; // Holds the image temporarily!

    window.onload = function() {
        connect();
        scrollToBottom();
    };

    function connect() {
        var socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/room/' + roomId, function (payload) {
                var message = JSON.parse(payload.body);
                drawMessageOnScreen(message);
            });
        });
    }

    // Updated to just compress and preview
    function previewImageFile(event) {
        var file = event.target.files[0];
        if (!file) return;

        var reader = new FileReader();

        reader.onload = function(e) {
            var img = new Image();

            img.onload = function() {
                var MAX_WIDTH = 800;
                var MAX_HEIGHT = 800;
                var width = img.width;
                var height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                } else {
                    if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                }

                var canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                attachedBase64Image = canvas.toDataURL('image/jpeg', 0.7);

                document.getElementById('previewImage').src = attachedBase64Image;
                document.getElementById('imagePreviewContainer').style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        document.getElementById('imageInput').value = '';
    }

    function removeAttachedImage() {
        attachedBase64Image = null;
        document.getElementById('imagePreviewContainer').style.display = 'none';
        document.getElementById('previewImage').src = '';
    }

    // Updated to send both together
    function sendMessage() {
        var messageInput = document.getElementById('messageInput');
        var messageContent = messageInput.value.trim();

        if ((messageContent || attachedBase64Image) && stompClient) {
            var chatMessage = {
                userId: senderId,
                userEmail: senderName, // Perfectly matches your Thymeleaf variable!
                content: messageContent,
                base64ImageCode: attachedBase64Image
            };
            stompClient.send("/app/chat/" + roomId + "/sendMessage", {}, JSON.stringify(chatMessage));

            messageInput.value = '';
            removeAttachedImage();
        }
    }

    function drawMessageOnScreen(message) {
        var messageArea = document.getElementById('messageArea');
        var wrapper = document.createElement('div');
        wrapper.classList.add('message-wrapper');

        var timeParts = message.createdAt ? message.createdAt.split(':') : new Date().toISOString().split('T')[1].split(':');
        var timeHtml = `<div style="font-size: 10px; color: #8d949e; margin-top: 4px; padding: 0 4px;">Hôm nay, lúc ${timeParts[0]}:${timeParts[1]}</div>`;

        var contentHtml = '';
        if (message.content && message.content.trim() !== "") {
            contentHtml += `<div class="message-bubble">${message.content}</div>`;
        }

        if (message.base64ImageCode) {
            contentHtml += `<div><img src="${message.base64ImageCode}" style="max-width: 200px; border-radius: 12px; margin-top: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer;" /></div>`;
        }

        if (message.userId === senderId || message.userEmail === senderName) {
            wrapper.classList.add('mine');
            wrapper.innerHTML = contentHtml + timeHtml;
        } else {
            wrapper.classList.add('theirs');
            wrapper.innerHTML = `
                <div class="sender-email" style="font-size: 12px; color: #65676B; margin-bottom: 4px; margin-left: 12px; font-weight: 600;">${message.userEmail}</div>
                ${contentHtml}
                ${timeHtml}
            `;
        }

        messageArea.appendChild(wrapper);
        scrollToBottom();
    }

    function scrollToBottom() {
        var messageArea = document.getElementById('messageArea');
        messageArea.scrollTop = messageArea.scrollHeight;
    }

    document.getElementById("messageInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
</script>

<script th:if="${success_msg != null}" th:inline="javascript">
    alert([[${success_msg}]]);
    window.location.href = /*[[@{/room/group/{group_id}/enter(group_id=${room_id})}]]*/ '/';
</script>

<script th:if="${error_msg != null}" th:inline="javascript">
    alert([[${error_msg}]]);
    window.location.href = /*[[@{/room/group/{group_id}/enter(group_id=${room_id})}]]*/ '/';
</script>

</body>
</html>
