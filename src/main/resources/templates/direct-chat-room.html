<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phòng Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .chat-container { width: 100%; max-width: 500px; background-color: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; }

        /* Header */
        .chat-header { background-color: #0084ff; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h3 { margin: 0; font-size: 18px; }
        .back-btn { color: white; text-decoration: none; font-size: 14px; background-color: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; transition: 0.2s; }
        .back-btn:hover { background-color: rgba(255,255,255,0.3); }

        /* Messages Area */
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background-color: #f0f2f5; }

        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .message-wrapper.mine { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.theirs { align-self: flex-start; align-items: flex-start; }

        .sender-name { font-size: 12px; color: #65676B; margin-bottom: 4px; margin-left: 4px; margin-right: 4px; }

        .message-bubble { padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .mine .message-bubble { background-color: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .theirs .message-bubble { background-color: white; color: black; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }

        /* Input Area */
        .chat-input-area { padding: 15px; background-color: white; display: flex; gap: 10px; border-top: 1px solid #e4e6eb; }
        .chat-input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ccd0d5; border-radius: 24px; outline: none; font-size: 15px; background-color: #f0f2f5; }
        .chat-input-area input:focus { border-color: #0084ff; }
        .chat-input-area button { padding: 10px 20px; background-color: #0084ff; color: white; border: none; border-radius: 24px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        .chat-input-area button:hover { background-color: #0073e6; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h3><span th:text="${room_name}"></span></h3>
        <a th:href="@{/user/homepage}" class="back-btn">⬅ Thoát</a>
    </div>

    <div class="chat-messages" id="messageArea">
        <div th:each="msg : ${chat_history}"
             class="message-wrapper"
             th:classappend="${msg.user.userId == sender.userId} ? 'mine' : 'theirs'">

            <div th:if="${msg.user.userId != sender.userId}"
                 class="user-email"
                 th:text="${msg.user.email}">Email người gửi
            </div>

            <div class="message-bubble" th:text="${msg.content}">Nội dung tin nhắn</div>

        </div>

    </div>

    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script th:inline="javascript">
    // Pulling the Java variables directly into JavaScript!
    var roomId = /*[[${room_id}]]*/ 'default_room';
    var senderId = /*[[${sender.userId}]]*/ null;
    var senderEmail = /*[[${sender.email}]]*/ 'User';

    var stompClient = null;

    // Connect to WebSockets immediately when the page loads
    window.onload = function() {
        connect();
        var messageArea = document.getElementById('messageArea');
        messageArea.scrollTop = messageArea.scrollHeight;
    };

    function connect() {
        // Connect to the /ws endpoint defined in your WebSocketConfig
        var socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        // Hide STOMP debug logs in the console (optional but keeps it clean)
        stompClient.debug = null;

        stompClient.connect({}, function (frame) {
            console.log('Connected to Chat Room: ' + roomId);

            // Subscribe to the specific room's radio frequency
            stompClient.subscribe('/topic/room/' + roomId, function (payload) {
                var message = JSON.parse(payload.body);
                displayMessage(message);
            });
        });
    }

    function sendMessage() {
        var messageInput = document.getElementById('messageInput');
        var messageContent = messageInput.value.trim();

        if (messageContent && stompClient) {
            // Build the MessageDTO exactly how your Java Controller expects it
            var chatMessage = {
                userId: senderId, // Make sure this matches your DTO field name!
                userEmail: senderEmail,
                content: messageContent,
            };

            // Send it to the ChatController
            // Note: If you have setApplicationDestinationPrefixes("/app"), you need "/app" here
            stompClient.send("/app/chat/" + roomId + "/sendMessage", {}, JSON.stringify(chatMessage));

            // Clear the input box
            messageInput.value = '';
        }
    }

    function displayMessage(message) {
        var messageArea = document.getElementById('messageArea');

        // Create the wrapper
        var wrapper = document.createElement('div');
        wrapper.classList.add('message-wrapper');

        // Check if I sent it, or if they sent it
        // Assuming your DTO sends back the sender's ID or Name to compare
        if (message.userId === senderId || message.userEmail === senderEmail) {
            wrapper.classList.add('mine');
            wrapper.innerHTML = `<div class="message-bubble">${message.content}</div>`;
        } else {
            wrapper.classList.add('theirs');
            // Show their name above their bubble
            wrapper.innerHTML = `
                <div class="sender-email">${message.userEmail}</div>
                <div class="message-bubble">${message.content}</div>
            `;
        }

        messageArea.appendChild(wrapper);

        // Auto-scroll to the newest message at the bottom
        messageArea.scrollTop = messageArea.scrollHeight;
    }

    // Allow sending messages by pressing the "Enter" key
    document.getElementById("messageInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
