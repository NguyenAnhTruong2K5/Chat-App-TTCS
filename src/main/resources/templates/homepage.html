<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chào mừng đến với Chat App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .welcome-container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            font-size: 54px;
            margin-bottom: 10px;
        }

        h1 {
            color: #1c1e21;
            font-size: 28px;
            margin-bottom: 10px;
            margin-top: 0;
        }

        p {
            color: #65676B;
            font-size: 16px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            box-sizing: border-box;
            transition: 0.2s;
            margin-bottom: 15px;
        }

        /* Blue Login Button */
        .btn-login {
            background-color: #0084ff;
            color: white;
            border: none;
            box-shadow: 0 2px 4px rgba(0, 132, 255, 0.2);
        }
        .btn-login:hover {
            background-color: #0073e6;
        }

        /* Green Sign Up Button */
        .btn-signup {
            background-color: #42b72a;
            color: white;
            border: none;
            box-shadow: 0 2px 4px rgba(66, 183, 42, 0.2);
        }
        .btn-signup:hover {
            background-color: #36a420;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: #8a8d91;
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <div class="logo">💬</div>

    <h1>Chat App</h1>
    <p>Chào mừng bạn tới nền tảng nhắn tin của chúng tôi!.</p>
    <p>Hãy chọn đăng nhập hoặc đăng ký!</p>

    <a th:href="@{/login}" class="btn btn-login">Đăng nhập</a>
    <a th:href="@{/register}" class="btn btn-signup">Tạo tài khoản mới</a>

</div>

</body>
</html>
